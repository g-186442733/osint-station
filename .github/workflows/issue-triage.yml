name: Issue Auto-Triage

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const body = (context.payload.issue.body || '').toLowerCase();
            const text = `${title} ${body}`;

            const rules = [
              { keywords: ['bug', 'error', 'crash', 'fix', 'broken', '报错', '异常', '崩溃'], label: 'bug' },
              { keywords: ['feature', 'enhancement', 'add', 'request', '新增', '功能', '需求'], label: 'enhancement' },
              { keywords: ['pipeline', 'etl', 'ingest', 'crawl', 'scrape', '爬虫', '管道'], label: 'data-pipeline' },
              { keywords: ['osint', 'intelligence', 'monitor', '情报', '监控', '追踪'], label: 'osint' },
              { keywords: ['deploy', 'infra', 'launchd', 'docker', 'ci', 'cd', '部署', '运维'], label: 'infra' },
              { keywords: ['doc', 'readme', 'guide', 'help', '文档', '说明'], label: 'docs' },
              { keywords: ['question', 'how to', 'why', '?', '怎么', '为什么', '如何'], label: 'question' },
            ];

            const labels = [];
            for (const rule of rules) {
              if (rule.keywords.some(kw => text.includes(kw))) {
                labels.push(rule.label);
              }
            }

            if (labels.length === 0) {
              labels.push('triage-needed');
            }

            const existingLabels = await github.rest.issues.listLabelsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            const existingNames = existingLabels.data.map(l => l.name);

            for (const label of labels) {
              if (!existingNames.includes(label)) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: label,
                  color: 'ededed',
                });
              }
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: labels,
            });

            core.info(`Applied labels: ${labels.join(', ')}`);
